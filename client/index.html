<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>E-Bike Wars</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #1a1a2e;
        overflow: hidden;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game-container {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
      }
      canvas { display: block; }
    </style>
  </head>
  <body>
    <div id="game-container">
      <div id="loading" style="color: #e94560; font-family: Arial, sans-serif; font-size: 24px; text-align: center; padding-top: 40vh;">
        Loading E-Bike Wars...
      </div>
    </div>
    <script>
      // Force container to exact viewport size (Kindle Silk workaround)
      function fixSize() {
        var c = document.getElementById('game-container');
        c.style.width = window.innerWidth + 'px';
        c.style.height = window.innerHeight + 'px';
      }
      fixSize();
      window.addEventListener('resize', fixSize);
      window.addEventListener('orientationchange', function() { setTimeout(fixSize, 300); });
    </script>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('loading').innerHTML =
          'Error: ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small>';
        document.getElementById('loading').style.color = '#ff4444';
      });
    </script>
  </body>
</html>
