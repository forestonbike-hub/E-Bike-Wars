<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>E-Bike Wars</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a2e;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="loading" style="color: #e94560; font-family: Arial, sans-serif; font-size: 24px;">
      Loading E-Bike Wars...
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // If you can see "Loading E-Bike Wars..." but nothing else,
      // check the browser console (F12) for errors
      window.addEventListener('error', function(e) {
        document.getElementById('loading').innerHTML =
          'Error: ' + e.message + '<br><small>' + e.filename + ':' + e.lineno + '</small>';
        document.getElementById('loading').style.color = '#ff4444';
      });
    </script>
  </body>
</html>
